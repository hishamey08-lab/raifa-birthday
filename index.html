<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raifa's Birthday</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(pink, lightblue);
overflow:hidden;
}

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
font-size:45px;
color:white;
text-shadow:2px 2px 6px black;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
}

button:hover{
background:#ff1a8c;
}

/* floating balloons */
.balloon{
position:absolute;
bottom:-100px;
width:60px;
height:80px;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

#gameArea{
position:relative;
width:100%;
height:60vh;
}

.popballoon{
position:absolute;
width:70px;
cursor:pointer;
}

.gallery img{
width:200px;
margin:10px;
border-radius:15px;
box-shadow:0 0 10px black;
}
</style>

</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8c6e6d9b8a.mp3?filename=happy-birthday-to-you-piano-version-13976.mp3" type="audio/mpeg">
</audio>

<div class="balloon" style="left:10%;background:red;"></div>
<div class="balloon" style="left:25%;background:yellow;"></div>
<div class="balloon" style="left:40%;background:blue;"></div>
<div class="balloon" style="left:55%;background:green;"></div>
<div class="balloon" style="left:70%;background:purple;"></div>
<div class="balloon" style="left:85%;background:orange;"></div>

<section id="page1">
<h1>Raifa’s Birthday Surprise 🎉</h1>
<button onclick="showPage2()">🎁 Click for a Surprise</button>
</section>

<section id="page2" style="display:none;">
<h1>Pop the Balloons 🎈</h1>
<h2 id="score">Score: 0</h2>

<div id="gameArea"></div>

<button id="nextBtn" onclick="showPage3()" style="display:none;">
Go to Birthday Page 🎂
</button>
</section>

<section id="page3" style="display:none;">
<h1>🎂 Happy 7th Birthday Raifa! 🎂</h1>

<p style="font-size:20px;color:white;">
Dear Raifa,<br><br>
May your birthday be full of joy, cake, fun and happiness! 🎂🎁<br>
Have the most magical birthday ever! ✨<br><br>
From your loving uncle ❤️
</p>

<div class="gallery">
<img src="raifa1.jpg">
<img src="raifa2.jpg">
<img src="raifa3.jpg">
</div>

</section>

<script>

let score = 0;

function showPage2(){
document.getElementById("music").play();
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="flex";
createBalloons();
}

function showPage3(){
document.getElementById("page2").style.display="none";
document.getElementById("page3").style.display="flex";
}

function createBalloons(){

for(let i=0;i<10;i++){

let balloon=document.createElement("img");

balloon.src="https://cdn-icons-png.flaticon.com/512/616/616408.png";
balloon.className="popballoon";

balloon.style.left=Math.random()*90+"%";
balloon.style.top=Math.random()*60+"%";

balloon.onclick=function(){

this.remove();
score++;

document.getElementById("score").innerText="Score: "+score;

if(score>=10){
document.getElementById("nextBtn").style.display="block";
}

};

document.getElementById("gameArea").appendChild(balloon);

}

}

</script>

</body>
</html>
